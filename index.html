<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Wedding Escort</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Zen+Old+Mincho:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="escort">

        <div class="live-date fade delay1">
            SPECIAL LIVE 2026.10.31
        </div>

        <div class="live-name fade delay2">
            MASASHI × AYAMI
        </div>

        <div class="live-title fade delay3">
            Happy Wedding Reception
        </div>

        <div class="guest-name fade delay4" id="guest-name">
            読み込み中...
        </div>

        <div class="message fade delay5">
            Thank you for coming
        </div>

        <div class="seat-info fade delay6">

            <div class="arena" id="arena"></div>

            <div class="seat" id="seat"></div>

        </div>

    </main>

    <script>

        const params = new URLSearchParams(window.location.search);
        const id = (params.get("id") || "").trim();

        fetch("./guests.json")
            .then(response => {

                if (!response.ok) {
                    throw new Error("guests.json の読み込みに失敗しました");
                }

                return response.json();

            })

            .then(data => {

                const guest = data.find(g =>
                    g.id.trim().toUpperCase() === id.toUpperCase()
                );

                if (guest) {

                    document.getElementById("guest-name").textContent = guest.name + " 様";
                    document.getElementById("arena").textContent = guest.arena;
                    document.getElementById("seat").textContent = guest.seat + "番";

                } else {

                    document.getElementById("guest-name").textContent = "ゲストが見つかりません";
                    document.getElementById("arena").textContent = "";
                    document.getElementById("seat").textContent = "";

                }

            })

            .catch(error => {

                console.error(error);

                document.getElementById("guest-name").textContent = "読み込みエラー";

            });

    </script>

</body>

</html>
