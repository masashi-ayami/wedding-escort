<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Ticket</title>

    <style>

    body{
        margin:0;
        font-family:sans-serif;
        background:#f8f6f2;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }

    .ticket{

        width:340px;

        background:white;

        border-radius:25px;

        padding:40px;

        text-align:center;

        box-shadow:0 20px 40px rgba(0,0,0,.15);

    }

    h1{

        font-size:22px;

        margin-bottom:10px;

    }

    .name{

        font-size:28px;

        font-weight:bold;

        margin:30px 0;

    }

    .seat{

        font-size:40px;

        font-weight:bold;

        margin-top:20px;

    }

    </style>

</head>

<body>

<div class="ticket">

<h1>Welcome</h1>

<div class="name">
山田 太郎 様
</div>

<div class="seat">

ARENA A

<br><br>

No.001

</div>

</div>

</body>

</html>
